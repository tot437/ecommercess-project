<!DOCTYPE html>
<html>

	<head>
		<title>Ecommerce Project</title>
		<meta charset="utf-8">

		<!-- Load a font called Roboto from Google Fonts. -->
		<link rel="stylesheet" href="./src/pages/header.css">
		<link rel="stylesheet" href="./src/pages/homepages.css">
		<link rel="stylesheet" href="./src/pages/generated.css">
	</head>

	<body>
		<div class="header">
			<div class="left-section">
				<a href="index.html" class="header-link" aria-label="Home">
					<img class="logo" src="./public/images/logo-white.png" alt="Home">
					<img class="mobile-logo" src="./public/images/mobile-logo-white.png" alt="Home">
				</a>
			</div>

			<div class="middle-section">
				<input class="search-bar" type="text" placeholder="Search">

				<button type="button" class="search-button">
					<img class="search-icon" src="./public/images/icons/search-icon.png" alt="Search">
				</button>
				<a class="orders-link header-link" href="orders.html">

					<span class="orders-text">Orders</span>
				</a>

				<a class="cart-link header-link" href="checkout.html">
					<img class="cart-icon" src="./public/images/icons/cart-icon.png" alt="Cart">
					<div class="cart-quantity">3</div>
					<div class="cart-text">Cart</div>
				</a>
			</div>
		</div>

		<div class="home-page">
			<div class="products-grid">

				<div class="product-container">
					<div class="product-image-container">
						<img class="product-image" src="./public/images/products/athletic-cotton-socks-6-pairs.jpg" alt="Black and Gray Athletic Cotton Socks - 6 Pairs">
					</div>
					<div class="product-name limit-text-to-2-lines">Black and Gray Athletic Cotton Socks - 6 Pairs</div>
					<div class="product-rating-container">
						<img class="product-rating-stars" src="./public/images/ratings/rating-45.png" alt="4.5 star rating">
						<div class="product-rating-count link-primary">87</div>
					</div>
					<div class="product-price">$10.90</div>
					<div class="product-quantity-container">
						<select>
							<option value="1">1</option><option value="2">2</option><option value="3">3</option>
							<option value="4">4</option><option value="5">5</option><option value="6">6</option>
							<option value="7">7</option><option value="8">8</option><option value="9">9</option>
							<option value="10">10</option>
						</select>
					</div>
					<div class="product-spacer"></div>
					<div class="added-to-cart">
						<img src="./public/images/icons/checkmark.png" alt="Checkmark">
						Added
					</div>
					<button class="add-to-cart-button button-primary">Add to Cart</button>
				</div>

				<div class="product-container">
					<div class="product-image-container">
						<img class="product-image" src="./public/images/products/intermediate-composite-basketball.jpg" alt="Intermediate Size Basketball">
					</div>
					<div class="product-name limit-text-to-2-lines">Intermediate Size Basketball</div>
					<div class="product-rating-container">
						<img class="product-rating-stars" src="./public/images/ratings/rating-40.png" alt="4.0 star rating">
						<div class="product-rating-count link-primary">127</div>
					</div>
					<div class="product-price">$20.95</div>
					<div class="product-quantity-container">
						<select>
							<option value="1">1</option><option value="2">2</option><option value="3">3</option>
							<option value="4">4</option><option value="5">5</option><option value="6">6</option>
							<option value="7">7</option><option value="8">8</option><option value="9">9</option>
							<option value="10">10</option>
						</select>
					</div>
					<div class="product-spacer"></div>
					<div class="added-to-cart">
						<img src="./public/images/icons/checkmark.png" alt="Checkmark">
						Added
					</div>
					<button class="add-to-cart-button button-primary">Add to Cart</button>
				</div>

				<div class="product-container">
					<div class="product-image-container">
						<img class="product-image" src="./public/images/products/adults-plain-cotton-tshirt-2-pack-teal.jpg" alt="Adults Plain Cotton T-Shirt - 2 Pack">
					</div>
					<div class="product-name limit-text-to-2-lines">Adults Plain Cotton T-Shirt - 2 Pack</div>
					<div class="product-rating-container">
						<img class="product-rating-stars" src="./public/images/ratings/rating-45.png" alt="4.5 star rating">
						<div class="product-rating-count link-primary">56</div>
					</div>
					<div class="product-price">$7.99</div>
					<div class="product-quantity-container">
						<select>
							<option value="1">1</option><option value="2">2</option><option value="3">3</option>
							<option value="4">4</option><option value="5">5</option><option value="6">6</option>
							<option value="7">7</option><option value="8">8</option><option value="9">9</option>
							<option value="10">10</option>
						</select>
					</div>
					<div class="product-spacer"></div>
					<div class="added-to-cart">
						<img src="./public/images/icons/checkmark.png" alt="Checkmark">
						Added
					</div>
					<button class="add-to-cart-button button-primary">Add to Cart</button>
				</div>
			</div>
		</div>
	</body>
</html>
